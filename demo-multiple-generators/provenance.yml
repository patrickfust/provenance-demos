$schema:  https://patrickfust.github.io/provenance/v1/provenance-schema.json
provenanceTitle: My database
schemaName: theSchema
tables:
  - name: table_a
    createTableScript: create_table_a.sql
    fields:
      - name: field_a
        dataType: int
        foreignKey:
          tableName: table_b
          columnName: field_b
  - name: table_b
    fields:
      - name: field_b
        dataType: int
  - name: table_in_group
    tags:
      - my_group
    fields:
      - name: field_b
        dataType: int
dataDictionary:
  dataDictionaryFiles:
    - fileName: some_file.csv
      version: 1.0.0
      fileDescription: some description
      columns:
        - columnName: some_column
          dataType: varchar(200)
          mandatory: true
        - columnName: some_other_column
          dataType: date
          example: xyz
          columnDescription: |-
            some description
            with multiple lines
    - fileName: some_other_file.csv
      version: 1.2.3
      fileDescription: some other description
      columns:
        - columnName: some_column
          dataType: number
